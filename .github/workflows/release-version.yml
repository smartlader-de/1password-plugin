name: Release Version Sync

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync static version metadata
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z, got: $tag" >&2
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set package version from tag
        run: npm version --no-git-tag-version --allow-same-version "${{ steps.tag.outputs.version }}"

      - name: Sync static metadata
        run: npm run sync:version

      - name: Run tests
        run: npm test

      - name: Commit synced version files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Version metadata already synced."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/plugin.json .cursor-plugin/plugin.json \
            1password-codex/.codex-plugin/plugin.json gemini-extension.json \
            skills/*/SKILL.md README.md
          git commit -m "chore(release): sync version v${{ steps.tag.outputs.version }}"
          git push origin HEAD:master
